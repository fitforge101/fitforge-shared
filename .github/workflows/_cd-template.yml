name: CD — Update Helm Chart

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Name of the service folder in fitforge-charts/microservices"
      image-tag:
        required: true
        type: string
        description: "New image tag to update in values.yaml"
      environment:
        required: true
        type: string
        description: "Target environment (main/develop)"
    secrets:
      HELM_REPO_PAT:
        required: true
        description: "PAT with push access to fitforge-charts repo"

jobs:
  update-chart:
    name: "CD: Update ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Charts Repository
        uses: actions/checkout@v4
        with:
          repository: fitforge101/fitforge-charts
          token: ${{ secrets.HELM_REPO_PAT }}
          path: charts
          ref: ${{ inputs.environment }}

      - name: Setup yq
        uses: mikefarah/yq@v4.44.1

      - name: Update image tag
        run: |
          FILE="charts/microservices/${{ inputs.service-name }}/values.yaml"
          if [ -f "$FILE" ]; then
            echo "Updating $FILE with tag ${{ inputs.image-tag }}"
            # Update the tag value. Ensure it's treated as a string to preserve formatting.
            yq -i ".image.tag = \"${{ inputs.image-tag }}\"" "$FILE"
          else
            echo "::error::File not found: $FILE (Is your service-name correct?)"
            exit 1
          fi

      - name: Validate values.yaml
        run: |
          # Ensure the YAML is still valid after modification
          yq eval '.' "charts/microservices/${{ inputs.service-name }}/values.yaml" > /dev/null

      - name: Commit and Push changes
        run: |
          cd charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific values file
          git add microservices/${{ inputs.service-name }}/values.yaml
          
          if git diff --staged --quiet; then
            echo "No changes detected in values.yaml (tag might already be up to date)"
          else
            git commit -m "cd: update ${{ inputs.service-name }} image tag to ${{ inputs.image-tag }} [${{ inputs.environment }}]"
            git push origin main
          fi
