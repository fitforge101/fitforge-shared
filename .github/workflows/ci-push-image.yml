name: Push Image

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  push-image:
    name: "Push Image - ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp

      - name: Load image into Docker
        run: docker load -i /tmp/image.tar

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push ${{ inputs.image_tag }}